<title data-i18n="page_title">HR PRO AI — Сброс пароля</title>
<link rel="icon" type="image/png" href="/favicon.png"><link rel="apple-touch-icon" href="/favicon.png">

<style>
:root{--a:#6f6ae0;--b:#4f78e6;--sh:60,90,200;--dot:#8b6cff}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:radial-gradient(ellipse 80% 70% at 50% 0%,#111634,#070813 70%);color:#e8ecf8;font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
a{color:#8b6cff;text-decoration:none}a:hover{color:#b3a4ff}
h1,h2{font-family:Manrope,Inter,sans-serif;margin:0}
.wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:34px 20px}
.top{width:100%;max-width:1200px;display:flex;justify-content:space-between;align-items:center;padding:26px 32px;position:absolute;top:0;left:50%;transform:translateX(-50%)}
.brand-logo{display:flex;align-items:center;gap:12px}
.brand-logo svg{width:40px;height:40px}
.brand-logo b{font-family:Manrope;font-weight:800;font-size:16px;color:#fff;display:block;line-height:1.05}
.brand-logo span{font-size:10px;color:#8b93ad;font-weight:600}
.lang-switch{display:inline-flex;gap:3px;align-items:center}
.lang-switch button{font:700 11px/1 JetBrains Mono,monospace;padding:6px 9px;border-radius:7px;border:1px solid rgba(255,255,255,.14);background:transparent;color:#8b93ad;cursor:pointer}
.lang-switch button.on{border-color:#6f97ff;background:rgba(77,124,255,.85);color:#fff;box-shadow:0 0 14px rgba(77,124,255,.5)}
.lang-dd{position:relative;display:inline-block}
.lang-dd-btn{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid rgba(255,255,255,.16);color:#c3cbe4;font:700 12px Inter,sans-serif;padding:7px 10px;border-radius:8px;cursor:pointer}
.lang-dd-btn .flg{font-size:14px;line-height:1}
.lang-dd-car{font-size:10px;opacity:.7;transition:transform .2s}
.lang-dd.open .lang-dd-car{transform:rotate(180deg)}
.lang-dd-menu{position:absolute;top:calc(100% + 7px);right:0;min-width:158px;background:#12142e;border:1px solid rgba(255,255,255,.12);border-radius:11px;padding:5px;display:none;flex-direction:column;gap:2px;z-index:60;box-shadow:0 14px 34px rgba(0,0,0,.55)}
.lang-dd.open .lang-dd-menu{display:flex}
.lang-dd-menu button{display:flex;align-items:center;gap:9px;background:transparent;border:0;color:#c3cbe4;font:600 13px Inter,sans-serif;padding:8px 10px;border-radius:7px;cursor:pointer;text-align:left;width:100%}
.lang-dd-menu button:hover{background:rgba(255,255,255,.07);color:#fff}
.lang-dd-menu button.on{background:rgba(77,124,255,.85);color:#fff}
.lang-dd-menu .flg{font-size:16px;line-height:1}
.card{width:100%;max-width:420px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:34px 34px 30px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.card h2{font-weight:800;font-size:26px;letter-spacing:-.02em;color:#eef1fb}
.card .sub{font-size:14px;line-height:1.55;color:#9aa3bf;margin:9px 0 24px}
form{display:flex;flex-direction:column;gap:15px}
.fld{display:flex;flex-direction:column;gap:7px}
.fld label{font-size:12.5px;font-weight:600;color:#c3cbe4}
.fld .wrap2{position:relative}
.afield{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:#eef1fb;font-family:Inter,sans-serif;font-size:14.5px;padding:13px 15px;outline:none;transition:border-color .2s,box-shadow .2s,background .2s}
.afield::placeholder{color:#5f6885}
.afield:focus{border-color:rgba(139,108,255,.7);box-shadow:0 0 0 3px rgba(123,108,255,.16);background:rgba(255,255,255,.06)}
.pw-toggle{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:#8b93ad;font:600 11px/1 JetBrains Mono,monospace;padding:6px 8px;border-radius:7px;cursor:pointer}
.submit{background:linear-gradient(135deg,var(--a),var(--b));color:#fff;font-weight:650;font-size:15px;padding:14px;border-radius:12px;box-shadow:0 8px 20px rgba(var(--sh),.32);margin-top:6px;border:none;cursor:pointer;transition:transform .16s cubic-bezier(.22,.68,.24,1),box-shadow .28s,filter .28s}
.submit:hover{transform:translateY(-2px);filter:brightness(1.06)}
.submit:disabled{opacity:.6;cursor:not-allowed;transform:none}
.msg{font-size:13px;line-height:1.5;padding:11px 14px;border-radius:11px;margin-top:2px}
.msg.err{background:rgba(224,85,91,.1);border:1px solid rgba(224,85,91,.3);color:#f0a5a8}
.msg.ok{background:rgba(67,224,160,.1);border:1px solid rgba(67,224,160,.3);color:#7ee7bf}
.foot-link{text-align:center;font-size:13.5px;color:#9aa3bf;margin-top:22px}
.state{text-align:center;padding:6px 0}
.state .ic{width:60px;height:60px;margin:0 auto 20px;border-radius:16px;display:grid;place-items:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1)}
.state h2{margin-bottom:10px}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important}}
</style>
</head><body>

<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5F4H4NZR" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<div class="top">
  <a href="/" class="brand-logo">
    <svg viewBox="0 0 64 64" fill="none"><path d="M32 4 56 18 56 46 32 60 8 46 8 18Z" stroke="#fff" stroke-width="2.6" stroke-linejoin="round" opacity=".9"/><line x1="33" y1="31" x2="22" y2="25" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/><line x1="33" y1="31" x2="41" y2="21" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/><line x1="33" y1="31" x2="46" y2="35" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/><line x1="33" y1="31" x2="29" y2="45" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/><circle cx="22" cy="25" r="3.4" stroke="#fff" stroke-width="2"/><circle cx="41" cy="21" r="3.6" stroke="#fff" stroke-width="2"/><circle cx="46" cy="35" r="3.2" stroke="#fff" stroke-width="2"/><circle cx="29" cy="45" r="3" stroke="#fff" stroke-width="2"/><circle cx="33" cy="31" r="4.2" fill="#FF7A5C"/></svg>
    <span style="line-height:1.05"><b>HR&nbsp;PRO&nbsp;AI</b><span data-i18n="tagline">технология, которая чувствует людей</span></span>
  </a>
  <span class="lang-dd" id="lang-dd">
    <button type="button" class="lang-dd-btn" id="lang-dd-btn"><span id="lang-dd-cur">RU</span><span class="lang-dd-car">▾</span></button>
    <span class="lang-dd-menu" id="lang-switch">
      <button data-lang="ru"><span class="flg">🇷🇺</span> Русский</button>
      <button data-lang="pl"><span class="flg">🇵🇱</span> Polski</button>
      <button data-lang="en"><span class="flg">🇬🇧</span> English</button>
    </span>
  </span>
</div>
<div class="wrap">
  <div class="card" id="card"></div>
</div>
<script>
const $=s=>document.querySelector(s);
const I18N={
  ru:{page_title:'HR PRO AI — Сброс пароля',tagline:'технология, которая чувствует людей',
    title:'Новый пароль',sub:'Задайте новый пароль для вашего аккаунта.',
    fPass:'Новый пароль',phPass:'Минимум 6 символов',fPass2:'Повторите пароль',phPass2:'Ещё раз',
    show:'ПОКАЗАТЬ',hide:'СКРЫТЬ',save:'Сохранить пароль',saving:'Минуту…',
    toLogin:'← Вернуться ко входу',
    okTitle:'Пароль изменён',okSub:'Теперь войдите с новым паролем.',okBtn:'Войти',
    errShort:'Пароль должен быть не короче 6 символов.',errMatch:'Пароли не совпадают.',
    errToken:'Ссылка недействительна или устарела.',errTokenSub:'Запросите новую ссылку для сброса пароля на странице входа.',
    errNetwork:'Нет связи с сервером.',requestNew:'Запросить новую ссылку'},
  pl:{page_title:'HR PRO AI — Reset hasła',tagline:'technologia, która czuje ludzi',
    title:'Nowe hasło',sub:'Ustaw nowe hasło do swojego konta.',
    fPass:'Nowe hasło',phPass:'Minimum 6 znaków',fPass2:'Powtórz hasło',phPass2:'Jeszcze raz',
    show:'POKAŻ',hide:'UKRYJ',save:'Zapisz hasło',saving:'Chwileczkę…',
    toLogin:'← Wróć do logowania',
    okTitle:'Hasło zmienione',okSub:'Zaloguj się nowym hasłem.',okBtn:'Zaloguj się',
    errShort:'Hasło musi mieć co najmniej 6 znaków.',errMatch:'Hasła nie są zgodne.',
    errToken:'Link jest nieprawidłowy lub wygasł.',errTokenSub:'Poproś o nowy link do resetu na stronie logowania.',
    errNetwork:'Brak połączenia z serwerem.',requestNew:'Poproś o nowy link'},
  en:{page_title:'HR PRO AI — Reset password',tagline:'technology that senses people',
    title:'New password',sub:'Set a new password for your account.',
    fPass:'New password',phPass:'At least 6 characters',fPass2:'Repeat password',phPass2:'Once more',
    show:'SHOW',hide:'HIDE',save:'Save password',saving:'One moment…',
    toLogin:'← Back to sign in',
    okTitle:'Password changed',okSub:'Now sign in with your new password.',okBtn:'Sign in',
    errShort:'Password must be at least 6 characters.',errMatch:'Passwords do not match.',
    errToken:'This link is invalid or expired.',errTokenSub:'Request a new reset link on the sign-in page.',
    errNetwork:'No connection to server.',requestNew:'Request a new link'}
};
const params=new URLSearchParams(location.search);
function pickLang(){const q=params.get('lang');if(['ru','pl','en'].includes(q)){localStorage.setItem('hp_lang',q);return q;}const s=localStorage.getItem('hp_lang');if(['ru','pl','en'].includes(s))return s;const n=(navigator.language||'').toLowerCase();if(n.startsWith('pl'))return'pl';if(n.startsWith('en'))return'en';return'ru';}
let LANG=pickLang(),SHOWPW=false;
const t=k=>{const v=I18N[LANG]&&I18N[LANG][k];return v==null?(I18N.ru[k]!=null?I18N.ru[k]:k):v;};
const E=params.get('e')||'',TK=params.get('t')||'',EXP=params.get('exp')||'';
const hasToken=!!(E&&TK&&EXP);

function renderForm(){
  $('#card').innerHTML=`
    <h2>${t('title')}</h2>
    <p class="sub">${t('sub')}</p>
    <div id="msg-box"></div>
    <form id="reset-form">
      <div class="fld"><label>${t('fPass')}</label><div class="wrap2">
        <input class="afield" id="p1" type="${SHOWPW?'text':'password'}" placeholder="${t('phPass')}" autocomplete="new-password">
        <button type="button" class="pw-toggle" id="pw-toggle">${SHOWPW?t('hide'):t('show')}</button></div></div>
      <div class="fld"><label>${t('fPass2')}</label><div class="wrap2">
        <input class="afield" id="p2" type="${SHOWPW?'text':'password'}" placeholder="${t('phPass2')}" autocomplete="new-password"></div></div>
      <button type="submit" class="submit" id="save">${t('save')}</button>
    </form>
    <div class="foot-link"><a href="/login?lang=${LANG}">${t('toLogin')}</a></div>`;
  $('#pw-toggle').onclick=()=>{SHOWPW=!SHOWPW;$('#p1').type=SHOWPW?'text':'password';$('#p2').type=SHOWPW?'text':'password';$('#pw-toggle').textContent=SHOWPW?t('hide'):t('show');};
  $('#reset-form').addEventListener('submit',submit);
}
function renderBadToken(){
  $('#card').innerHTML=`
    <div class="state">
      <div class="ic"><svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="#e0555b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg></div>
      <h2>${t('errToken')}</h2>
      <p class="sub" style="text-align:center">${t('errTokenSub')}</p>
      <a href="/login?lang=${LANG}" class="submit" style="display:block;text-align:center;text-decoration:none">${t('requestNew')}</a>
    </div>`;
}
function renderOk(){
  $('#card').innerHTML=`
    <div class="state">
      <div class="ic"><svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="#43e0a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l4 4 10-11"/></svg></div>
      <h2>${t('okTitle')}</h2>
      <p class="sub" style="text-align:center">${t('okSub')}</p>
      <a href="/login?lang=${LANG}" class="submit" style="display:block;text-align:center;text-decoration:none">${t('okBtn')}</a>
    </div>`;
}
function msg(text,kind){$('#msg-box').innerHTML=text?`<div class="msg ${kind||'err'}">${text}</div>`:'';}

async function submit(e){
  e.preventDefault();
  const p1=$('#p1').value||'',p2=$('#p2').value||'';
  if(p1.length<6){msg(t('errShort'));return;}
  if(p1!==p2){msg(t('errMatch'));return;}
  const btn=$('#save');btn.disabled=true;btn.textContent=t('saving');msg('');
  try{
    const r=await fetch('/api/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({e:E,t:TK,exp:EXP,password:p1})});
    const d=await r.json().catch(()=>({}));
    if(r.ok&&d.ok){renderOk();return;}
    if(d.error==='invalid_token'){renderBadToken();return;}
    if(d.error==='weak_password'){msg(t('errShort'));btn.disabled=false;btn.textContent=t('save');return;}
    msg(t('errNetwork'));btn.disabled=false;btn.textContent=t('save');
  }catch(err){msg(t('errNetwork'));btn.disabled=false;btn.textContent=t('save');}
}
function applyLang(){
  LANG=pickLang();document.documentElement.lang=LANG;document.title=t('page_title');
  document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.getAttribute('data-i18n'));});
  document.querySelectorAll('#lang-switch button').forEach(b=>b.classList.toggle('on',b.dataset.lang===LANG));
  const cur=document.getElementById('lang-dd-cur');if(cur)cur.textContent=LANG.toUpperCase();
  if(!hasToken)renderBadToken();else renderForm();
}
document.querySelectorAll('#lang-switch button').forEach(b=>b.onclick=()=>{localStorage.setItem('hp_lang',b.dataset.lang);applyLang();});
(function(){const dd=document.getElementById('lang-dd'),btn=document.getElementById('lang-dd-btn');
  if(!dd||!btn)return;
  btn.addEventListener('click',e=>{e.stopPropagation();dd.classList.toggle('open');});
  dd.querySelectorAll('[data-lang]').forEach(b=>b.addEventListener('click',()=>dd.classList.remove('open')));
  document.addEventListener('click',()=>dd.classList.remove('open'));})();
applyLang();
</script>
</body></html>
