<!doctype html>
<html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HR PRO AI</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
</head><body>
<div class="take-shell" id="shell">
  <div class="take-top">
    <span class="brand-mark" id="brand" style="width:40px;height:40px;border-radius:12px"><svg viewBox="0 0 64 64" fill="none"><path d="M32 4 56 18 56 46 32 60 8 46 8 18Z" stroke="#fff" stroke-width="2.4" stroke-linejoin="round" opacity=".9"/><circle cx="33" cy="31" r="4.2" fill="#FF7A5C"/></svg></span>
    <div><div style="font-weight:800" id="a-company">HR PRO AI</div><div class="muted" style="font-size:12.5px" id="a-sub">Отклик на вакансию</div></div>
  </div>
  <div class="take-body" id="root"><p class="muted">Загрузка…</p></div>
</div>
<div class="toast" id="toast"></div>
<script>
const $=(s,r=document)=>r.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const toast=m=>{const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);};
if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');
// локализация публичной анкеты — по языку вакансии
const AL={
  ru:{sub:'Отклик на вакансию',loading:'Загрузка…',not_found:'Анкета не найдена',check_link:'Проверьте ссылку.',fill:'Заполните форму, чтобы откликнуться на вакансию.',name:'Имя',surname:'Фамилия',phone:'Телефон',city:'Город',name_ph:'Ваше имя',surname_ph:'Ваша фамилия',city_ph:'Город',cv:'Резюме (CV)',attach:'Прикрепить файл',no_file:'Файл не выбран',apply:'Откликнуться',bad_email:'Укажите корректный email',bad_phone:'Укажите корректный телефон (9–15 цифр)',sending:'Отправка…',too_big:'Файл слишком большой (макс 12 МБ)',thanks:'Спасибо! Ваш отклик получен.',send_err:'Ошибка отправки',done:'Готово!'},
  pl:{sub:'Zgłoszenie na wakat',loading:'Ładowanie…',not_found:'Nie znaleziono ankiety',check_link:'Sprawdź link.',fill:'Wypełnij formularz, aby zgłosić się na wakat.',name:'Imię',surname:'Nazwisko',phone:'Telefon',city:'Miasto',name_ph:'Twoje imię',surname_ph:'Twoje nazwisko',city_ph:'Miasto',cv:'CV',attach:'Załącz plik',no_file:'Nie wybrano pliku',apply:'Zgłoś się',bad_email:'Podaj poprawny e-mail',bad_phone:'Podaj poprawny telefon (9–15 cyfr)',sending:'Wysyłanie…',too_big:'Plik za duży (maks. 12 MB)',thanks:'Dziękujemy! Twoje zgłoszenie zostało odebrane.',send_err:'Błąd wysyłania',done:'Gotowe!'},
  en:{sub:'Job application',loading:'Loading…',not_found:'Form not found',check_link:'Check the link.',fill:'Fill in the form to apply for the vacancy.',name:'First name',surname:'Last name',phone:'Phone',city:'City',name_ph:'Your first name',surname_ph:'Your last name',city_ph:'City',cv:'Resume (CV)',attach:'Attach file',no_file:'No file selected',apply:'Apply',bad_email:'Enter a valid email',bad_phone:'Enter a valid phone (9–15 digits)',sending:'Sending…',too_big:'File too large (max 12 MB)',thanks:'Thank you! Your application has been received.',send_err:'Sending error',done:'Done!'},
};
let AG='ru';
const al=k=>(AL[AG]&&AL[AG][k]!=null?AL[AG][k]:AL.ru[k]);
const slug=decodeURIComponent(location.pathname.split('/').pop());
let A=null;
async function load(){
  const r=await fetch('/api/a/'+encodeURIComponent(slug));
  if(!r.ok){$('#root').innerHTML='<div class="card"><h2>'+al('not_found')+'</h2><p class="muted">'+al('check_link')+'</p></div>';return;}
  A=await r.json().then(d=>d.anketa);
  AG=['ru','pl','en'].includes(A.lang)?A.lang:'ru';document.documentElement.lang=AG;
  $('#a-sub').textContent=al('sub');
  if(A.company)$('#a-company').textContent=A.company;
  if(A.logo)$('#brand').innerHTML='<img src="'+esc(A.logo)+'" style="width:100%;height:100%;object-fit:cover;border-radius:12px">';
  document.title=A.pageTitle||A.title||'HR PRO AI';
  // JSON-LD JobPosting для Google for Jobs (Googlebot исполняет JS и читает разметку)
  fetch('/api/a/'+encodeURIComponent(slug)+'/jsonld').then(r=>r.json()).then(ld=>{
    if(ld&&ld.title){const s=document.createElement('script');s.type='application/ld+json';s.textContent=JSON.stringify(ld);document.head.appendChild(s);}
  }).catch(()=>{});
  renderForm();
}
function renderForm(){
  $('#root').innerHTML=`<div class="card" style="max-width:560px;margin:0 auto">
    <h1 style="font-size:26px;margin-bottom:6px">${esc(A.pageTitle||A.title)}</h1>
    ${A.description?`<div class="anketa-desc">${A.description}</div>`:`<p class="muted" style="margin-bottom:8px">${al('fill')}</p>`}
    <div class="form-grid" style="margin-top:16px">
      <div><label class="lbl">${al('name')}</label><input class="field" id="f-name" placeholder="${al('name_ph')}"></div>
      <div><label class="lbl">${al('surname')}</label><input class="field" id="f-surname" placeholder="${al('surname_ph')}"></div>
      <div><label class="lbl">Email *</label><input class="field" id="f-email" type="email" placeholder="you@email.com"></div>
      <div><label class="lbl">${al('phone')}</label><input class="field" id="f-tel" placeholder="+…"></div>
      <div><label class="lbl">${al('city')}</label><input class="field" id="f-city" placeholder="${al('city_ph')}"></div>
    </div>
    <label class="lbl" style="margin-top:14px">${al('cv')}</label>
    <div class="cv-up"><input type="file" id="f-cv" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg" hidden>
      <button type="button" class="btn ghost" id="cv-btn">${al('attach')}</button>
      <span class="cv-name muted" id="cv-name">${al('no_file')}</span></div>
    <button class="btn lg" id="apply" style="width:100%;margin-top:18px">${esc(A.btnText||al('apply'))}</button></div>`;
  $('#cv-btn').onclick=()=>$('#f-cv').click();
  $('#f-cv').onchange=()=>{const f=$('#f-cv').files[0];$('#cv-name').textContent=f?f.name:al('no_file');};
  $('#apply').onclick=apply;
  // маска телефона: только +, цифры, пробелы, скобки, дефис
  const telI=$('#f-tel');if(telI)telI.addEventListener('input',()=>{telI.value=telI.value.replace(/[^\d+\s()-]/g,'').replace(/(?!^)\+/g,'');});
  $('#f-email').addEventListener('keydown',e=>{if(e.key==='Enter')apply();});
}
async function apply(){
  const email=$('#f-email').value.trim();
  if(!/.+@.+\..+/.test(email))return toast(al('bad_email'));
  const btn=$('#apply');btn.disabled=true;btn.textContent=al('sending');
  const telV=$('#f-tel').value.trim();
  if(telV&&(telV.replace(/\D/g,'').length<9||telV.replace(/\D/g,'').length>15)){btn.disabled=false;btn.textContent=esc(A.btnText||al('apply'));return toast(al('bad_phone'));}
  const body={name:$('#f-name').value,surname:$('#f-surname').value,email,tel:telV,city:$('#f-city').value,src:new URLSearchParams(location.search).get('src')||''};
  const cf=$('#f-cv').files[0];
  if(cf){ if(cf.size>12*1024*1024){toast(al('too_big'));btn.disabled=false;btn.textContent=esc(A.btnText||al('apply'));return;} body.cvData=await new Promise(r=>{const rd=new FileReader();rd.onload=()=>r(rd.result);rd.readAsDataURL(cf);}); body.cvName=cf.name; }
  try{
    const d=await fetch('/api/a/'+encodeURIComponent(slug)+'/apply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json());
    if(d.links&&d.links.length){
      location.href=d.links[0].link;
    } else {
      done(d.msgApply||al('thanks'));
    }
  }catch(e){toast(al('send_err'));btn.disabled=false;btn.textContent=esc(A.btnText||al('apply'));}
}
function done(msg){
  $('#root').innerHTML=`<div class="card" style="text-align:center;max-width:520px;margin:0 auto">
    <div class="done-mark pop" style="color:var(--good);margin:0 auto 8px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12.5l2.5 2.5L16 9"/></svg></div>
    <h1 style="margin:6px 0">${al('done')}</h1><p style="font-size:16px">${esc(msg)}</p></div>`;
}
load();
</script>
</body></html>
